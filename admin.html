<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>老东北 · 后台管理</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0a04; --surface: #1a1108; --border: rgba(216,177,106,0.15);
      --gold: #D8B16A; --gold-dim: rgba(216,177,106,0.5); --cream: #f0e6d0;
      --muted: rgba(240,230,208,0.45); --red: #b32722; --green: #2a7a4f;
    }
    body { background: var(--bg); color: var(--cream); font-family: 'Noto Serif SC', serif; min-height: 100vh; }

    /* LOGIN */
    #loginScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:2rem; }
    .login-box { background:var(--surface); border:1px solid var(--border); padding:3rem 2.5rem; width:100%; max-width:380px; text-align:center; }
    .login-logo { font-family:'EB Garamond',serif; font-size:0.75rem; letter-spacing:0.3em; color:var(--gold-dim); text-transform:uppercase; margin-bottom:0.5rem; }
    .login-title { font-size:1.6rem; color:var(--gold); margin-bottom:2rem; font-weight:400; }
    .input-field { width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--border); color:var(--cream); padding:0.85rem 1rem; font-family:'Noto Serif SC',serif; font-size:0.95rem; margin-bottom:1rem; outline:none; }
    .input-field:focus { border-color:var(--gold-dim); }
    .btn-primary { width:100%; background:var(--gold); color:#0f0a04; border:none; padding:0.9rem; font-family:'Noto Serif SC',serif; font-size:1rem; font-weight:600; cursor:pointer; letter-spacing:0.1em; }
    .btn-primary:hover { opacity:0.85; }
    .login-err { color:#e74c3c; font-size:0.82rem; margin-top:0.75rem; display:none; }

    /* ADMIN */
    #adminScreen { display:none; }
    .topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:1rem 2rem; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
    .topbar-brand { font-family:'EB Garamond',serif; font-size:0.72rem; letter-spacing:0.25em; color:var(--gold-dim); text-transform:uppercase; }
    .topbar-title { font-size:1.05rem; color:var(--gold); font-weight:400; }
    .topbar-right { display:flex; gap:0.75rem; align-items:center; flex-wrap:wrap; }
    .tab-btn { background:transparent; border:1px solid var(--border); color:var(--muted); padding:0.4rem 1rem; font-family:'Noto Serif SC',serif; font-size:0.78rem; cursor:pointer; transition:all 0.2s; }
    .tab-btn:hover, .tab-btn.active { border-color:var(--gold-dim); color:var(--gold); background:rgba(216,177,106,0.07); }
    .logout-btn { background:transparent; border:1px solid var(--border); color:var(--muted); padding:0.4rem 0.9rem; font-family:'Noto Serif SC',serif; font-size:0.78rem; cursor:pointer; }
    .logout-btn:hover { border-color:var(--gold-dim); color:var(--gold); }

    .main { padding:2rem; max-width:1200px; margin:0 auto; }

    /* STATS */
    .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:1rem; margin-bottom:2rem; }
    .stat-card { background:var(--surface); border:1px solid var(--border); padding:1.4rem 1.5rem; }
    .stat-label { font-family:'EB Garamond',serif; font-size:0.7rem; letter-spacing:0.2em; color:var(--gold-dim); text-transform:uppercase; margin-bottom:0.5rem; }
    .stat-value { font-size:1.8rem; color:var(--gold); }
    .stat-sub { font-size:0.75rem; color:var(--muted); margin-top:0.2rem; }

    /* TOOLBAR */
    .toolbar { display:flex; gap:0.75rem; align-items:center; margin-bottom:1.5rem; flex-wrap:wrap; }
    .filter-btn { background:transparent; border:1px solid var(--border); color:var(--muted); padding:0.4rem 1rem; font-family:'Noto Serif SC',serif; font-size:0.78rem; cursor:pointer; transition:all 0.2s; }
    .filter-btn.active, .filter-btn:hover { border-color:var(--gold-dim); color:var(--gold); background:rgba(216,177,106,0.07); }
    .refresh-btn { margin-left:auto; background:transparent; border:1px solid var(--border); color:var(--muted); padding:0.4rem 1rem; font-family:'Noto Serif SC',serif; font-size:0.78rem; cursor:pointer; }
    .refresh-btn:hover { border-color:var(--gold-dim); color:var(--gold); }

    /* TABLE */
    .table-wrap { background:var(--surface); border:1px solid var(--border); overflow-x:auto; }
    table { width:100%; border-collapse:collapse; }
    thead { background:rgba(216,177,106,0.06); }
    th { font-family:'EB Garamond',serif; font-size:0.7rem; letter-spacing:0.2em; color:var(--gold-dim); text-transform:uppercase; text-align:left; padding:1rem 1.2rem; border-bottom:1px solid var(--border); white-space:nowrap; }
    td { padding:0.9rem 1.2rem; border-bottom:1px solid rgba(216,177,106,0.07); font-size:0.86rem; vertical-align:top; }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:rgba(216,177,106,0.03); }

    .badge { font-size:0.72rem; padding:0.2rem 0.5rem; border-radius:2px; }
    .badge-delivery { background:rgba(26,74,122,0.3); color:#7ab3e0; border:1px solid rgba(122,179,224,0.3); }
    .badge-pickup { background:rgba(42,122,79,0.25); color:#7fd4a4; border:1px solid rgba(127,212,164,0.3); }

    .status-select { background:transparent; border:1px solid var(--border); color:var(--cream); padding:0.3rem 0.5rem; font-family:'Noto Serif SC',serif; font-size:0.78rem; cursor:pointer; outline:none; border-radius:2px; }
    .status-select.pending  { border-color:rgba(230,180,50,0.5); color:#e6b432; }
    .status-select.confirmed { border-color:rgba(42,122,79,0.6); color:#7fd4a4; }
    .status-select.delivered { border-color:rgba(216,177,106,0.4); color:var(--gold); }
    .status-select.cancelled { border-color:rgba(179,39,34,0.5); color:#e74c3c; }

    .empty { text-align:center; padding:3rem; color:var(--muted); font-family:'EB Garamond',serif; letter-spacing:0.1em; }
    .loading { text-align:center; padding:3rem; color:var(--gold-dim); font-size:0.88rem; letter-spacing:0.1em; }

    /* MENU FORM */
    .form-card { background:var(--surface); border:1px solid var(--border); padding:1.5rem; margin-bottom:1.5rem; }
    .form-label { font-family:'EB Garamond',serif; font-size:0.7rem; letter-spacing:0.2em; color:var(--gold-dim); text-transform:uppercase; margin-bottom:1rem; display:block; }
    .form-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:0.75rem; margin-bottom:0.75rem; }
    .form-grid .span-full { grid-column:1/-1; }
    .add-btn { background:var(--gold); color:#0f0a04; border:none; padding:0.7rem 2rem; font-family:'Noto Serif SC',serif; font-size:0.9rem; font-weight:600; cursor:pointer; }
    .del-btn { background:transparent; border:1px solid rgba(179,39,34,0.4); color:#e74c3c; padding:0.3rem 0.7rem; cursor:pointer; font-size:0.75rem; font-family:inherit; }
    .day-label { display:inline-flex; align-items:center; gap:0.3rem; cursor:pointer; padding:0.35rem 0.7rem; border:1px solid var(--border); color:var(--muted); font-size:0.82rem; transition:all 0.2s; user-select:none; }
    .day-label:has(input:checked) { border-color:rgba(216,177,106,0.5); color:var(--gold); background:rgba(216,177,106,0.07); }
    .limited-label { display:inline-flex; align-items:center; gap:0.3rem; cursor:pointer; padding:0.35rem 0.7rem; border:1px solid rgba(179,39,34,0.38); color:#e05a4e; font-size:0.82rem; transition:all 0.2s; user-select:none; margin-left:0.65rem; }
    .limited-label:has(input:checked) { border-color:rgba(179,39,34,0.75); color:#ff6b5f; background:rgba(179,39,34,0.12); }
    .limited-pill { font-size:0.66rem; padding:0.12rem 0.45rem; border-radius:2px; user-select:none; white-space:nowrap; color:var(--gold); border:1px solid rgba(216,177,106,0.55); background:rgba(216,177,106,0.08); }
    .day-tag { display:inline-block; padding:0.2rem 0.5rem; border:1px solid rgba(216,177,106,0.25); color:var(--muted); font-size:0.75rem; margin:0.1rem 0.15rem; cursor:pointer; transition:all 0.15s; border-radius:2px; }
    .day-tag.active { border-color:rgba(42,180,80,0.7); color:#4fdb7a; background:rgba(42,180,80,0.12); }
    .day-tag:hover { border-color:var(--gold-dim); color:var(--gold); }
    .rank-card { background:var(--surface); border:1px solid var(--border); padding:1.2rem; }
    .rank-card-title { font-family:'EB Garamond',serif; font-size:0.7rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--gold-dim); margin-bottom:0.8rem; padding-bottom:0.6rem; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
    .rank-item { display:flex; align-items:center; gap:0.6rem; padding:0.5rem 0; border-bottom:1px solid rgba(216,177,106,0.05); font-size:0.85rem; }
    .rank-item:last-child { border-bottom:none; }
    .rank-item-name { flex:1; color:var(--cream); }
    .rank-item-en { font-size:0.72rem; color:var(--muted); }
    .rank-avail { font-size:0.7rem; padding:0.15rem 0.4rem; border-radius:2px; }
    .rank-avail.on { color:#4fdb7a; border:1px solid rgba(42,180,80,0.4); }
    .rank-avail.off { color:#e74c3c; border:1px solid rgba(179,39,34,0.4); }
    .rank-empty { color:var(--muted); font-size:0.8rem; padding:0.5rem 0; font-style:italic; }

    /* WEEK NAVIGATOR */
    .week-nav { display:flex; align-items:center; justify-content:center; gap:1rem; margin-bottom:1.2rem; }
    .week-nav-btn { background:var(--surface); border:1px solid var(--border); color:var(--cream); padding:0.55rem 1.1rem; font-family:'EB Garamond',serif; font-size:0.8rem; letter-spacing:0.1em; cursor:pointer; transition:background 0.2s,border-color 0.2s; }
    .week-nav-btn:hover { background:rgba(216,177,106,0.08); border-color:var(--gold-dim); }
    .week-nav-label { font-family:'EB Garamond',serif; font-size:0.95rem; letter-spacing:0.05em; color:var(--gold); min-width:220px; text-align:center; }
    .week-nav-today { background:transparent; border:1px solid rgba(216,177,106,0.3); color:var(--gold-dim); padding:0.4rem 0.8rem; font-size:0.72rem; letter-spacing:0.08em; cursor:pointer; border-radius:2px; }
    .week-nav-today:hover { color:var(--gold); border-color:var(--gold); }

    /* DISH COUNT PANEL */
    .dish-count-panel { background:var(--surface); border:1px solid var(--border); padding:1.4rem 1.5rem; margin-bottom:1.5rem; }
    .dish-count-header { font-family:'EB Garamond',serif; font-size:0.7rem; letter-spacing:0.2em; color:var(--gold-dim); text-transform:uppercase; margin-bottom:1.2rem; display:flex; justify-content:space-between; align-items:center; }
    .dish-count-days { display:flex; gap:1.5rem; flex-wrap:wrap; align-items:flex-start; }
    .dish-count-day { flex:1; min-width:140px; }
    .dc-day-label { font-family:'EB Garamond',serif; font-size:0.78rem; letter-spacing:0.15em; color:var(--gold); text-transform:uppercase; border-bottom:1px solid rgba(216,177,106,0.2); padding-bottom:0.5rem; margin-bottom:0.7rem; }
    .dc-row { display:flex; align-items:baseline; justify-content:space-between; padding:0.28rem 0; border-bottom:1px solid rgba(216,177,106,0.05); gap:0.8rem; }
    .dc-row:last-child { border-bottom:none; }
    .dc-dish { font-size:0.83rem; color:var(--cream); flex:1; }
    .dc-bar-wrap { display:flex; align-items:center; gap:0.5rem; }
    .dc-bar { height:4px; background:rgba(216,177,106,0.35); border-radius:2px; min-width:4px; }
    .dc-cnt { font-size:0.82rem; color:var(--gold); font-weight:600; white-space:nowrap; min-width:2rem; text-align:right; }
    .dc-cat-label { font-size:0.72rem; color:var(--muted); letter-spacing:0.08em; margin-bottom:0.35rem; padding-top:0.1rem; }
    .dish-count-empty { color:var(--muted); font-size:0.82rem; font-style:italic; }

    /* SPICE PICKER */
    .spice-picker { display:inline-flex; gap:0.1rem; cursor:pointer; font-size:1rem; user-select:none; }
    .spice-picker span { opacity:0.25; transition:opacity 0.15s; }
    .spice-picker span.lit { opacity:1; }

    /* DAY BOARD */
    .day-board { display:grid; grid-template-columns:repeat(5,1fr); gap:0.9rem; margin-bottom:1.5rem; }
    .day-box { background:var(--surface); border:1px solid var(--border); border-top:3px solid var(--gold); padding:0.9rem 0.9rem 1rem; border-radius:3px; min-height:170px; transition:background 0.2s; }
    .day-box-header { font-size:1rem; font-weight:600; letter-spacing:0.05em; margin-bottom:0.7rem; padding-bottom:0.5rem; border-bottom:1px solid rgba(255,255,255,0.06); }
    .db-section { margin-bottom:0.7rem; }
    .db-section:last-child { margin-bottom:0; }
    .db-section-label { font-family:'EB Garamond',serif; font-size:0.68rem; letter-spacing:0.15em; text-transform:uppercase; opacity:0.85; margin-bottom:0.4rem; }
    .db-dish-row { padding:0.4rem 0; border-bottom:1px solid rgba(255,255,255,0.05); }
    .db-dish-row:last-child { border-bottom:none; }
    .db-dish-top { display:flex; align-items:center; justify-content:space-between; gap:0.4rem; margin-bottom:0.3rem; }
    .db-dish-name { font-size:0.8rem; color:var(--cream); line-height:1.3; }
    .db-dish-name.off { color:var(--muted); }
    .db-dish-bottom { display:flex; align-items:center; justify-content:space-between; gap:0.4rem; }
    .db-spice-mini { display:inline-flex; gap:0.05rem; cursor:pointer; font-size:0.72rem; user-select:none; flex-shrink:0; }
    .db-spice-mini span { opacity:0.22; transition:opacity 0.15s; }
    .db-spice-mini span.lit { opacity:1; }
    .db-avail-pill { font-size:0.66rem; padding:0.12rem 0.45rem; border-radius:2px; cursor:pointer; user-select:none; transition:all 0.15s; white-space:nowrap; }
    .db-avail-pill.on { color:#4fdb7a; border:1px solid rgba(42,180,80,0.4); }
    .db-avail-pill.on:hover { background:rgba(42,180,80,0.1); }
    .db-avail-pill.off { color:#e74c3c; border:1px solid rgba(179,39,34,0.4); }
    .db-avail-pill.off:hover { background:rgba(179,39,34,0.1); }
    .db-del-btn { background:transparent; border:1px solid rgba(179,39,34,0.35); color:#e74c3c; width:1.3rem; height:1.3rem; line-height:1; border-radius:2px; cursor:pointer; font-size:0.78rem; font-family:inherit; flex-shrink:0; opacity:0.7; }
    .db-del-btn:hover { opacity:1; background:rgba(179,39,34,0.12); }
    .db-empty { font-size:0.78rem; color:var(--muted); font-style:italic; opacity:0.7; }
    @media(max-width:1000px) { .day-board { grid-template-columns:repeat(3,1fr); } }
    @media(max-width:700px) { .day-board { grid-template-columns:repeat(2,1fr); } }
    @media(max-width:480px) { .day-board { grid-template-columns:1fr; } }

    @media(max-width:700px) { .main{padding:1rem;} .topbar{padding:0.8rem 1rem;} th,td{padding:0.7rem 0.8rem;} }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">Lao Dong Bei · Food Service</div>
    <div class="login-title">后台管理</div>
    <button class="btn-primary" onclick="login()">点击进入</button>
  </div>
</div>

<!-- ADMIN -->
<div id="adminScreen">
  <div class="topbar">
    <div>
      <div class="topbar-brand">Lao Dong Bei · Food Service</div>
      <div class="topbar-title">后台管理</div>
    </div>
    <div class="topbar-right">
      <span id="lastUpdated" style="font-size:0.72rem;color:var(--muted);"></span>
      <button class="tab-btn active" id="btnOrders" onclick="showTab('orders')">📋 订单</button>
      <button class="tab-btn" id="btnMenu" onclick="showTab('menu')">🍽 菜单</button>
      <button class="tab-btn" id="btnRank" onclick="showTab('rank')">📅 菜单排期</button>
      <button class="logout-btn" onclick="logout()">退出</button>
    </div>
  </div>

  <div class="main">

    <!-- WEEK NAVIGATOR -->
    <div class="week-nav">
      <button class="week-nav-btn" onclick="changeWeek(-1)">‹ 上一周</button>
      <span class="week-nav-label" id="weekNavLabel">本周</span>
      <button class="week-nav-btn" onclick="changeWeek(1)">下一周 ›</button>
      <button class="week-nav-today" id="weekNavToday" onclick="goToCurrentWeek()" style="display:none;">回到本周</button>
    </div>

    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">本周订单</div><div class="stat-value" id="statTotal">—</div><div class="stat-sub">笔</div></div>
      <div class="stat-card"><div class="stat-label">本周收入</div><div class="stat-value" id="statRevTotal">—</div><div class="stat-sub">美元</div></div>
      <div class="stat-card"><div class="stat-label">待确认</div><div class="stat-value" id="statPending">—</div><div class="stat-sub">笔</div></div>
      <div class="stat-card"><div class="stat-label">送餐订单</div><div class="stat-value" id="statDelivery">—</div><div class="stat-sub">笔</div></div>
    </div>

    <!-- ORDERS TAB -->
    <div id="tabOrders">
      <!-- DISH COUNT PANEL -->
      <div class="dish-count-panel">
        <div class="dish-count-header">
          <span>📊 本周菜品点单统计</span>
          <span id="dishCountUpdated" style="font-size:0.72rem;color:var(--muted);"></span>
        </div>
        <div class="toolbar" style="margin-bottom:0.75rem;">
          <span style="font-size:0.78rem;color:var(--muted);margin-right:0.4rem;">显示：</span>
          <select id="dishCatFilter" class="status-select" style="padding:0.4rem 0.8rem;" onchange="updateDishCount()">
            <option value="all">全部</option>
            <option value="lunch">仅午餐</option>
            <option value="dinner">仅晚餐单点</option>
          </select>
          <span style="font-size:0.78rem;color:var(--muted);margin:0 0.4rem 0 0.8rem;">排序：</span>
          <select id="dishSortSelect" class="status-select" style="padding:0.4rem 0.8rem;" onchange="updateDishCount()">
            <option value="count">按点单人数</option>
            <option value="name">按菜名</option>
          </select>
        </div>
        <div class="dish-count-days" id="dishCountGrid"><span class="dish-count-empty">加载中...</span></div>
      </div>
      <div class="toolbar">
        <button class="filter-btn active" onclick="setFilter('all',this)">全部</button>
        <button class="filter-btn" onclick="setFilter('pending',this)">待确认</button>
        <button class="filter-btn" onclick="setFilter('confirmed',this)">已确认</button>
        <button class="filter-btn" onclick="setFilter('delivered',this)">已完成</button>
        <button class="filter-btn" onclick="setFilter('cancelled',this)">已取消</button>
        <span style="font-size:0.78rem;color:var(--muted);margin:0 0.4rem 0 0.8rem;">取送：</span>
        <select id="deliveryFilter" class="status-select" style="padding:0.5rem 0.9rem;" onchange="renderOrders()">
          <option value="all">全部</option>
          <option value="delivery">送餐</option>
          <option value="pickup">取餐</option>
        </select>
        <span style="font-size:0.78rem;color:var(--muted);margin:0 0.4rem 0 0.8rem;">排序：</span>
        <select id="orderSortSelect" class="status-select" style="padding:0.5rem 0.9rem;" onchange="renderOrders()">
          <option value="time_desc">时间（新→旧）</option>
          <option value="time_asc">时间（旧→新）</option>
          <option value="total_desc">金额（高→低）</option>
          <option value="total_asc">金额（低→高）</option>
          <option value="name">姓名</option>
        </select>
        <button class="refresh-btn" onclick="loadOrders()">↻ 刷新</button>
      </div>
      <div class="table-wrap">
        <div id="ordersLoading" class="loading">加载中...</div>
        <table id="ordersTable" style="display:none;">
          <thead><tr><th>姓名</th><th>菜品</th><th>金额</th><th>取送</th><th>备注</th><th>时间</th><th>状态</th><th></th></tr></thead>
          <tbody id="ordersBody"></tbody>
        </table>
        <div id="ordersEmpty" class="empty" style="display:none;">暂无订单</div>
      </div>
    </div>

    <!-- MENU TAB -->
    <div id="tabMenu" style="display:none;">
      <!-- Add form -->
      <div class="form-card">
        <span class="form-label">添加新菜品</span>
        <div class="form-grid">
          <input id="newNameCn" class="input-field" placeholder="中文菜名 *" style="margin:0"/>
          <input id="newNameEn" class="input-field" placeholder="English Name" style="margin:0"/>
          <input id="newPrice" class="input-field" placeholder="价格（午餐填0）" type="number" style="margin:0"/>
          <select id="newCategory" class="status-select" style="padding:0.85rem 1rem;" onchange="handleNewCategoryChange()">
            <option value="lunch">午餐</option>
            <option value="dinner">晚餐单点</option>
          </select>
        </div>
        <div style="margin:0.75rem 0;">

  // Returns the date string (YYYY-MM-DD, America/Los_Angeles) of the Saturday
  // that starts a given week, offset by `weekOffset` weeks from the current week.
  // A "week" runs Saturday through the following Friday — i.e. weekend orders
  // (Sat/Sun) count toward the upcoming week's menu, not the week just finished.
  // weekOffset: 0 = this week, -1 = last week, 1 = next week.
  function getWeekRange(weekOffset) {
    const now = new Date();
    const parts = new Intl.DateTimeFormat('en-CA', {
      timeZone: 'America/Los_Angeles', year: 'numeric', month: '2-digit', day: '2-digit'
    }).formatToParts(now);
    const map = {};
    parts.forEach(p => map[p.type] = p.value);
    const todayLA = new Date(`${map.year}-${map.month}-${map.day}T00:00:00`);
    const dow = todayLA.getDay(); // 0=Sun..6=Sat
    const daysSinceSaturday = (dow + 1) % 7; // Sat=0, Sun=1, Mon=2, ... Fri=6
    const saturday = new Date(todayLA);
    saturday.setDate(saturday.getDate() - daysSinceSaturday + (weekOffset * 7));
    const friday = new Date(saturday);
    friday.setDate(friday.getDate() + 6);
    const fmt = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    return { start: fmt(saturday), end: fmt(friday), mondayDate: saturday, sundayDate: friday };
  }

  let weekOffset = 0;

  function changeWeek(delta) {
    weekOffset += delta;

  function renderWeekLabel() {
    const { mondayDate, sundayDate } = getWeekRange(weekOffset);

    let prefix = '';
    if (weekOffset === 0) prefix = '本周 · ';

    document.getElementById('weekNavToday').style.display = weekOffset === 0 ? 'none' : 'inline-block';
  }

  // Returns the subset of allOrders whose created_at falls within the currently
  // viewed week (per weekOffset), in America/Los_Angeles time.
  function ordersInCurrentWeek() {
    const { start, end } = getWeekRange(weekOffset);
    return allOrders.filter(o => {
      if (!o.created_at) return false;
      const d = new Date(o.created_at).toLocaleDateString('en-CA', { timeZone: 'America/Los_Angeles' });
      return d >= start && d <= end;
    });
  }

  function updateStats() {

  // Returns set of all dinner dish name_cn values from menuItems
  function getDinnerSet() {
    const s = new Set();
    menuItems.forEach(m => { if (m.category === 'dinner') s.add(m.name_cn); });
    return s;
  }

  function updateDishCount() {
    // byDay[weekday][cat] = { dishName: count }  cat = 'lunch' | 'dinner'
    const byDay = {};
    const DAY_ORDER = ['周一','周二','周三','周四','周五','周六','周日'];
    const dinnerSet = getDinnerSet();
    const weekOrders = ordersInCurrentWeek();
    const catFilter = document.getElementById('dishCatFilter') ? document.getElementById('dishCatFilter').value : 'all';
    const sortBy = document.getElementById('dishSortSelect') ? document.getElementById('dishSortSelect').value : 'count';

    weekOrders.forEach(o => {
      if (!o.orders || o.status === 'cancelled') return;
      o.orders.split('\n').forEach(line => {
        const dayMatch = line.match(/^(周[一二三四五六日])/);
        const dishMatch = line.match(/·\s*(.+?)\s*\$/);
        if (!dayMatch || !dishMatch) return;
        const day = dayMatch[1];
        if (!byDay[day]) byDay[day] = { lunch: {}, dinner: {} };

        const dishStr = dishMatch[1].replace(/（[^）]*）/g, '').replace(/\([^)]*\)/g, '');
        dishStr.split(/[、，,]/).forEach(d => {
          const name = d.trim();
          if (!name) return;
          const origMatch = dishMatch[1].match(new RegExp(name.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '(?:（[^）]*）|\\([^)]*\\))?'));
          const fullName = origMatch ? origMatch[0].trim() : name;
          if (!fullName) return;
          // Match against dinner menu; anything not in dinnerSet = lunch
          const cat = dinnerSet.has(name) ? 'dinner' : 'lunch';
          byDay[day][cat][fullName] = (byDay[day][cat][fullName] || 0) + 1;
        });
      });
    });

    const grid = document.getElementById('dishCountGrid');
    document.getElementById('dishCountUpdated').textContent =
      '更新于 ' + new Date().toLocaleTimeString('zh-CN', {timeZone:'America/Los_Angeles', hour:'2-digit', minute:'2-digit'});

    const activeDays = DAY_ORDER.filter(d => byDay[d] && (
      (catFilter !== 'dinner' && Object.keys(byDay[d].lunch).length) ||
      (catFilter !== 'lunch' && Object.keys(byDay[d].dinner).length)
    ));
    if (!activeDays.length) {
      grid.innerHTML = '<span class="dish-count-empty">本周暂无订单数据</span>';
      return;
    }

    function renderCatRows(catObj) {
      let entries = Object.entries(catObj);
      if (sortBy === 'name') entries.sort((a, b) => a[0].localeCompare(b[0], 'zh'));
      else entries.sort((a, b) => b[1] - a[1]);
      if (!entries.length) return '<div style="color:var(--muted);font-size:0.78rem;font-style:italic;padding:0.2rem 0;">—</div>';
      const maxCnt = Math.max(...entries.map(e => e[1]));
      return entries.map(([dish, cnt]) => {
        const barW = Math.round((cnt / maxCnt) * 72);
        return `<div class="dc-row">
          <span class="dc-dish">${dish}</span>
          <div class="dc-bar-wrap">
            <div class="dc-bar" style="width:${barW}px"></div>
            <span class="dc-cnt">${cnt} 人</span>
          </div>
        </div>`;
      }).join('');
    }

    grid.innerHTML = activeDays.map(day => {
      const d = byDay[day];
      const hasLunch  = catFilter !== 'dinner' && Object.keys(d.lunch).length > 0;
      const hasDinner = catFilter !== 'lunch' && Object.keys(d.dinner).length > 0;
      return `<div class="dish-count-day">
        <div class="dc-day-label">${day}</div>
        ${hasLunch  ? `<div class="dc-cat-label">🍱 午餐</div>${renderCatRows(d.lunch)}`  : ''}
        ${hasDinner ? `<div class="dc-cat-label" style="margin-top:${hasLunch?'0.8rem':'0'}">🥢 晚餐单点</div>${renderCatRows(d.dinner)}` : ''}
      </div>`;
    }).join('');
  }

  // MENU
  let menuItems = [];

  async function loadMenuItems(skipRender) {

  // DAY BOARD: 五个方框对应周一到周五，颜色区分，分午餐/晚餐展示
  const DAY_COLORS = {
    '周一': '#e05a4e', // 红
    '周二': '#e0954e', // 橙
    '周三': '#d8b16a', // 金（品牌色）
    '周四': '#4fae6e', // 绿
    '周五': '#4f9fc0'  // 蓝
  };
  function hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${alpha})`;
  }
  function renderDayBoard() {
    const board = document.getElementById('dayBoard');

    if (!menuItems.length) {
      board.innerHTML = '<div class="db-empty" style="grid-column:1/-1;padding:1.5rem 0;text-align:center;">暂无菜品，请先在上方添加</div>';
      return;
    }
    const days = ['周一','周二','周三','周四','周五'];
    function dishRow(m) {
      const spiceLevel = m.spicy_level || 0;
      const spicePicker = `<div class="db-spice-mini">${[1,2,3,4,5].map(n=>`<span class="${n<=spiceLevel?'lit':''}" onclick="setSpice(${m.id},${n},this.parentElement)">🌶️</span>`).join('')}</div>`;
      const availPill = `<span class="db-avail-pill ${m.available?'on':'off'}" onclick="toggleAvail(${m.id},${!m.available})">${m.available?'上架':'下架'}</span>`;
      const limitedPill = (m.limited_supply === true || ((m.description || '').includes('__LDB_LIMITED_SUPPLY__'))) ? `<span class="limited-pill">限时供应</span>` : '';
      return `<div class="db-dish-row">
        <div class="db-dish-top">
          <span class="db-dish-name${m.available?'':' off'}">${m.name_cn}</span>
          ${spicePicker}
        </div>
        <div class="db-dish-bottom">
          <div style="display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap;">${availPill}${limitedPill}</div>
          <button class="db-del-btn" onclick="deleteItem(${m.id})" title="删除">×</button>
        </div>
      </div>`;
    }
    function section(label, list, color) {
      const body = list.length ? list.map(dishRow).join('') : '<div class="db-empty">暂无菜品</div>';
      return `<div class="db-section">
        <div class="db-section-label" style="color:${color}">${label} · ${list.length}</div>
        ${body}
      </div>`;
    }
    board.innerHTML = days.map(day => {
      const color = DAY_COLORS[day];
      const dayItems = menuItems.filter(m => {
        const d = m.day_of_week ? m.day_of_week.split(',').map(x => x.trim()) : [];
        return d.includes(day) || d.includes('每日');
      });
      const lunch = dayItems.filter(m => m.category === 'lunch');
      const dinner = dayItems.filter(m => m.category === 'dinner');
      return `<div class="day-box" style="border-top-color:${color};background:${hexToRgba(color,0.05)}">
        <div class="day-box-header" style="color:${color}">${day}</div>
        ${section('午餐', lunch, color)}
        ${section('晚餐', dinner, color)}
      </div>`;
    }).join('');
  }

  function toggleDayLabel(cb) {
    // handled by CSS :has selector
  }

  function handleNewCategoryChange() {
    const category = document.getElementById('newCategory').value;
    const priceInput = document.getElementById('newPrice');
    priceInput.placeholder = category === 'lunch' ? '价格（午餐填0）' : '价格';
  }


  let newSpiceLevel = 0;
  function setNewSpice(level, pickerEl) {
    newSpiceLevel = (newSpiceLevel === level) ? 0 : level;
    const spans = pickerEl.querySelectorAll('span');
    spans.forEach((s, i) => s.classList.toggle('lit', i < newSpiceLevel));
  }

  async function toggleDay(id, day, el) {
    const item = menuItems.find(m => m.id === id);
    if (!item) return;
    let days = item.day_of_week ? item.day_of_week.split(',').map(d=>d.trim()).filter(Boolean) : [];
    if (days.includes(day)) {
      days = days.filter(d => d !== day);
      el.classList.remove('active');
    } else {
      days.push(day);
      el.classList.add('active');
    }
    item.day_of_week = days.join(',');
    renderDayBoard();
    await fetch(SUPABASE_URL + '/rest/v1/menu_items?id=eq.' + id, {
      method: 'PATCH',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ day_of_week: item.day_of_week })
    });
  }

  async function toggleAvail(id, val) {
    await fetch(SUPABASE_URL + '/rest/v1/menu_items?id=eq.' + id, {
      method: 'PATCH',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ available: val })
    });
    await loadMenuItems();
  }

  async function setSpice(id, level, pickerEl) {
    const item = menuItems.find(m => m.id === id);
    const newLevel = (item && item.spicy_level === level) ? 0 : level;
    const spans = pickerEl.querySelectorAll('span');
    spans.forEach((s, i) => s.classList.toggle('lit', i < newLevel));
    if (item) item.spicy_level = newLevel;
    renderDayBoard();
    const res = await fetch(SUPABASE_URL + '/rest/v1/menu_items?id=eq.' + id, {
      method: 'PATCH',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
      body: JSON.stringify({ spicy_level: newLevel })
    });
    const text = await res.text();
    if (!res.ok || text === '[]' || text === '') {
      alert('辣度保存失败 (HTTP ' + res.status + ')\n\n返回内容: ' + text + '\n\n请检查:\n1. Supabase RLS 是否允许 anon UPDATE\n2. spicy_level 列是否存在于 menu_items 表');
    }
  }

  async function updateDay(id, day) {
    await fetch(SUPABASE_URL + '/rest/v1/menu_items?id=eq.' + id, {
      method: 'PATCH',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ day_of_week: day })
    });
  }

  async function deleteItem(id) {
    if (!confirm('确定删除这道菜？')) return;
    await fetch(SUPABASE_URL + '/rest/v1/menu_items?id=eq.' + id, {
      method: 'DELETE',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    await loadMenuItems();
  }

  async function addMenuItem() {
    const name_cn = document.getElementById('newNameCn').value.trim();
    const name_en = document.getElementById('newNameEn').value.trim();
    const price = parseFloat(document.getElementById('newPrice').value) || 0;
    const isLimited = document.getElementById('newLimitedSupply') && document.getElementById('newLimitedSupply').checked;
    const category = document.getElementById('newCategory').value;
    const checkedDays = [...document.querySelectorAll('input[name="newDay"]:checked')].map(cb => cb.value);
    const day_of_week = checkedDays.join(',');
    const rawDescription = document.getElementById('newDesc').value.trim();
    const limitedMarker = '__LDB_LIMITED_SUPPLY__';
    const description = isLimited
      ? (rawDescription ? rawDescription + ' ' + limitedMarker : limitedMarker)
      : rawDescription;
    const spicy_level = newSpiceLevel;

    if (!name_cn) { alert('请填写中文菜名'); return; }
    if (!day_of_week) { alert('请至少选择一个供应日期'); return; }

    const basePayload = { name_cn, name_en, price, category, day_of_week, description, spicy_level, available: true };
    let payload = isLimited ? { ...basePayload, limited_supply: true } : basePayload;

    let res = await fetch(SUPABASE_URL + '/rest/v1/menu_items', {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify(payload)
    });

    // If the database does not yet have a limited_supply column, retry without that field.
    // The hidden marker in description still lets this admin page display the gold “限时供应” label.
    if (!res.ok && isLimited) {
      const firstErr = await res.text();
      res = await fetch(SUPABASE_URL + '/rest/v1/menu_items', {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify(basePayload)
      });
      if (!res.ok) {
        const secondErr = await res.text();
        alert('添加失败，请检查 Supabase 表结构或权限。\n\n第一次错误：' + firstErr + '\n\n重试错误：' + secondErr);
        return;
      }
    } else if (!res.ok) {
      const err = await res.text();
      alert('添加失败，请检查 Supabase 表结构或权限。\n\n错误：' + err);
      return;
    }

    ['newNameCn','newNameEn','newPrice','newDesc'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('newCategory').value = 'lunch';
    const limitedCb = document.getElementById('newLimitedSupply');
    if (limitedCb) limitedCb.checked = false;
    handleNewCategoryChange();
    document.querySelectorAll('input[name="newDay"]').forEach(cb => {
      cb.checked = false;
      cb.parentElement.style.color = 'var(--muted)';
      cb.parentElement.style.borderColor = 'var(--border)';
    });
    newSpiceLevel = 0;
    document.querySelectorAll('#newSpicePicker span').forEach(s => s.classList.remove('lit'));
    await loadMenuItems();
  }
</script>
</body>
