<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>老东北 · 后台管理</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0a04; --surface: #1a1108; --border: rgba(216,177,106,0.15);
      --gold: #D8B16A; --gold-dim: rgba(216,177,106,0.5); --cream: #f0e6d0;
      --muted: rgba(240,230,208,0.45); --red: #b32722; --green: #2a7a4f;
    }
    body { background: var(--bg); color: var(--cream); font-family: 'Noto Serif SC', serif; min-height: 100vh; }

    /* LOGIN */
    #loginScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:2rem; }
    .login-box { background:var(--surface); border:1px solid var(--border); padding:3rem 2.5rem; width:100%; max-width:380px; text-align:center; }
    .login-logo { font-family:'EB Garamond',serif; font-size:0.75rem; letter-spacing:0.3em; color:var(--gold-dim); text-transform:uppercase; margin-bottom:0.5rem; }
    .login-title { font-size:1.6rem; color:var(--gold); margin-bottom:2rem; font-weight:400; }
    .input-field { width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--border); color:var(--cream); padding:0.85rem 1rem; font-family:'Noto Serif SC',serif; font-size:0.95rem; margin-bottom:1rem; outline:none; }
    .input-field:focus { border-color:var(--gold-dim); }
    .btn-primary { width:100%; background:var(--gold); color:#0f0a04; border:none; padding:0.9rem; font-family:'Noto Serif SC',serif; font-size:1rem; font-weight:600; cursor:pointer; letter-spacing:0.1em; }
    .btn-primary:hover { opacity:0.85; }
    .login-err { color:#e74c3c; font-size:0.82rem; margin-top:0.75rem; display:none; }

    /* ADMIN */
    #adminScreen { display:none; }
    .topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:1rem 2rem; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
    .topbar-brand { font-family:'EB Garamond',serif; font-size:0.72rem; letter-spacing:0.25em; color:var(--gold-dim); text-transform:uppercase; }
    .topbar-title { font-size:1.05rem; color:var(--gold); font-weight:400; }
    .topbar-right { display:flex; gap:0.75rem; align-items:center; flex-wrap:wrap; }
    .tab-btn { background:transparent; border:1px solid var(--border); color:var(--muted); padding:0.4rem 1rem; font-family:'Noto Serif SC',serif; font-size:0.78rem; cursor:pointer; transition:all 0.2s; }
    .tab-btn:hover, .tab-btn.active { border-color:var(--gold-dim); color:var(--gold); background:rgba(216,177,106,0.07); }
    .logout-btn { background:transparent; border:1px solid var(--border); color:var(--muted); padding:0.4rem 0.9rem; font-family:'Noto Serif SC',serif; font-size:0.78rem; cursor:pointer; }
    .logout-btn:hover { border-color:var(--gold-dim); color:var(--gold); }

    .main { padding:2rem; max-width:1200px; margin:0 auto; }

    /* STATS */
    .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:1rem; margin-bottom:2rem; }
    .stat-card { background:var(--surface); border:1px solid var(--border); padding:1.4rem 1.5rem; }
    .stat-label { font-family:'EB Garamond',serif; font-size:0.7rem; letter-spacing:0.2em; color:var(--gold-dim); text-transform:uppercase; margin-bottom:0.5rem; }
    .stat-value { font-size:1.8rem; color:var(--gold); }
    .stat-sub { font-size:0.75rem; color:var(--muted); margin-top:0.2rem; }

    /* TOOLBAR */
    .toolbar { display:flex; gap:0.75rem; align-items:center; margin-bottom:1.5rem; flex-wrap:wrap; }
    .filter-btn { background:transparent; border:1px solid var(--border); color:var(--muted); padding:0.4rem 1rem; font-family:'Noto Serif SC',serif; font-size:0.78rem; cursor:pointer; transition:all 0.2s; }
    .filter-btn.active, .filter-btn:hover { border-color:var(--gold-dim); color:var(--gold); background:rgba(216,177,106,0.07); }
    .refresh-btn { margin-left:auto; background:transparent; border:1px solid var(--border); color:var(--muted); padding:0.4rem 1rem; font-family:'Noto Serif SC',serif; font-size:0.78rem; cursor:pointer; }
    .refresh-btn:hover { border-color:var(--gold-dim); color:var(--gold); }

    /* TABLE */
    .table-wrap { background:var(--surface); border:1px solid var(--border); overflow-x:auto; }
    table { width:100%; border-collapse:collapse; }
    thead { background:rgba(216,177,106,0.06); }
    th { font-family:'EB Garamond',serif; font-size:0.7rem; letter-spacing:0.2em; color:var(--gold-dim); text-transform:uppercase; text-align:left; padding:1rem 1.2rem; border-bottom:1px solid var(--border); white-space:nowrap; }
    td { padding:0.9rem 1.2rem; border-bottom:1px solid rgba(216,177,106,0.07); font-size:0.86rem; vertical-align:top; }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:rgba(216,177,106,0.03); }

    .badge { font-size:0.72rem; padding:0.2rem 0.5rem; border-radius:2px; }
    .badge-delivery { background:rgba(26,74,122,0.3); color:#7ab3e0; border:1px solid rgba(122,179,224,0.3); }
    .badge-pickup { background:rgba(42,122,79,0.25); color:#7fd4a4; border:1px solid rgba(127,212,164,0.3); }

    .status-select { background:transparent; border:1px solid var(--border); color:var(--cream); padding:0.3rem 0.5rem; font-family:'Noto Serif SC',serif; font-size:0.78rem; cursor:pointer; outline:none; border-radius:2px; }
    .status-select.pending  { border-color:rgba(230,180,50,0.5); color:#e6b432; }
    .status-select.confirmed { border-color:rgba(42,122,79,0.6); color:#7fd4a4; }
    .status-select.delivered { border-color:rgba(216,177,106,0.4); color:var(--gold); }
    .status-select.cancelled { border-color:rgba(179,39,34,0.5); color:#e74c3c; }

    .empty { text-align:center; padding:3rem; color:var(--muted); font-family:'EB Garamond',serif; letter-spacing:0.1em; }
    .loading { text-align:center; padding:3rem; color:var(--gold-dim); font-size:0.88rem; letter-spacing:0.1em; }

    /* MENU FORM */
    .form-card { background:var(--surface); border:1px solid var(--border); padding:1.5rem; margin-bottom:1.5rem; }
    .form-label { font-family:'EB Garamond',serif; font-size:0.7rem; letter-spacing:0.2em; color:var(--gold-dim); text-transform:uppercase; margin-bottom:1rem; display:block; }
    .form-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:0.75rem; margin-bottom:0.75rem; }
    .form-grid .span-full { grid-column:1/-1; }
    .add-btn { background:var(--gold); color:#0f0a04; border:none; padding:0.7rem 2rem; font-family:'Noto Serif SC',serif; font-size:0.9rem; font-weight:600; cursor:pointer; }
    .del-btn { background:transparent; border:1px solid rgba(179,39,34,0.4); color:#e74c3c; padding:0.3rem 0.7rem; cursor:pointer; font-size:0.75rem; font-family:inherit; }
    .day-label { display:inline-flex; align-items:center; gap:0.3rem; cursor:pointer; padding:0.35rem 0.7rem; border:1px solid var(--border); color:var(--muted); font-size:0.82rem; transition:all 0.2s; user-select:none; }
    .day-label:has(input:checked) { border-color:rgba(216,177,106,0.5); color:var(--gold); background:rgba(216,177,106,0.07); }
    .day-tag { display:inline-block; padding:0.2rem 0.5rem; border:1px solid rgba(216,177,106,0.25); color:var(--muted); font-size:0.75rem; margin:0.1rem 0.15rem; cursor:pointer; transition:all 0.15s; border-radius:2px; }
    .day-tag.active { border-color:rgba(42,180,80,0.7); color:#4fdb7a; background:rgba(42,180,80,0.12); }
    .day-tag:hover { border-color:var(--gold-dim); color:var(--gold); }
    .rank-card { background:var(--surface); border:1px solid var(--border); padding:1.2rem; }
    .rank-card-title { font-family:'EB Garamond',serif; font-size:0.7rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--gold-dim); margin-bottom:0.8rem; padding-bottom:0.6rem; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
    .rank-item { display:flex; align-items:center; gap:0.6rem; padding:0.5rem 0; border-bottom:1px solid rgba(216,177,106,0.05); font-size:0.85rem; }
    .rank-item:last-child { border-bottom:none; }
    .rank-item-name { flex:1; color:var(--cream); }
    .rank-item-en { font-size:0.72rem; color:var(--muted); }
    .rank-avail { font-size:0.7rem; padding:0.15rem 0.4rem; border-radius:2px; }
    .rank-avail.on { color:#4fdb7a; border:1px solid rgba(42,180,80,0.4); }
    .rank-avail.off { color:#e74c3c; border:1px solid rgba(179,39,34,0.4); }
    .rank-empty { color:var(--muted); font-size:0.8rem; padding:0.5rem 0; font-style:italic; }

    @media(max-width:700px) { .main{padding:1rem;} .topbar{padding:0.8rem 1rem;} th,td{padding:0.7rem 0.8rem;} }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">Lao Dong Bei · Food Service</div>
    <div class="login-title">后台管理</div>
    <input id="pwInput" class="input-field" type="password" placeholder="请输入管理密码" onkeydown="if(event.key==='Enter')login()"/>
    <button class="btn-primary" onclick="login()">登 录</button>
    <div class="login-err" id="loginErr">密码错误，请重试</div>
  </div>
</div>

<!-- ADMIN -->
<div id="adminScreen">
  <div class="topbar">
    <div>
      <div class="topbar-brand">Lao Dong Bei · Food Service</div>
      <div class="topbar-title">后台管理</div>
    </div>
    <div class="topbar-right">
      <span id="lastUpdated" style="font-size:0.72rem;color:var(--muted);"></span>
      <button class="tab-btn active" id="btnOrders" onclick="showTab('orders')">📋 订单</button>
      <button class="tab-btn" id="btnMenu" onclick="showTab('menu')">🍽 菜单</button>
      <button class="tab-btn" id="btnRank" onclick="showTab('rank')">📅 菜单排期</button>
      <button class="logout-btn" onclick="logout()">退出</button>
    </div>
  </div>

  <div class="main">

    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">今日订单</div><div class="stat-value" id="statToday">—</div><div class="stat-sub">笔</div></div>
      <div class="stat-card"><div class="stat-label">今日收入</div><div class="stat-value" id="statRevToday">—</div><div class="stat-sub">美元</div></div>
      <div class="stat-card"><div class="stat-label">总订单</div><div class="stat-value" id="statTotal">—</div><div class="stat-sub">笔</div></div>
      <div class="stat-card"><div class="stat-label">总收入</div><div class="stat-value" id="statRevTotal">—</div><div class="stat-sub">美元</div></div>
      <div class="stat-card"><div class="stat-label">待确认</div><div class="stat-value" id="statPending">—</div><div class="stat-sub">笔</div></div>
      <div class="stat-card"><div class="stat-label">送餐订单</div><div class="stat-value" id="statDelivery">—</div><div class="stat-sub">笔</div></div>
    </div>

    <!-- ORDERS TAB -->
    <div id="tabOrders">
      <div class="toolbar">
        <button class="filter-btn active" onclick="setFilter('all',this)">全部</button>
        <button class="filter-btn" onclick="setFilter('pending',this)">待确认</button>
        <button class="filter-btn" onclick="setFilter('confirmed',this)">已确认</button>
        <button class="filter-btn" onclick="setFilter('delivered',this)">已完成</button>
        <button class="filter-btn" onclick="setFilter('cancelled',this)">已取消</button>
        <button class="refresh-btn" onclick="loadOrders()">↻ 刷新</button>
      </div>
      <div class="table-wrap">
        <div id="ordersLoading" class="loading">加载中...</div>
        <table id="ordersTable" style="display:none;">
          <thead><tr><th>姓名</th><th>菜品</th><th>金额</th><th>取送</th><th>备注</th><th>时间</th><th>状态</th><th></th></tr></thead>
          <tbody id="ordersBody"></tbody>
        </table>
        <div id="ordersEmpty" class="empty" style="display:none;">暂无订单</div>
      </div>
    </div>

    <!-- MENU TAB -->
    <div id="tabMenu" style="display:none;">
      <!-- Add form -->
      <div class="form-card">
        <span class="form-label">添加新菜品</span>
        <div class="form-grid">
          <input id="newNameCn" class="input-field" placeholder="中文菜名 *" style="margin:0"/>
          <input id="newNameEn" class="input-field" placeholder="English Name" style="margin:0"/>
          <input id="newPrice" class="input-field" placeholder="价格（午餐填0）" type="number" style="margin:0"/>
          <select id="newCategory" class="status-select" style="padding:0.85rem 1rem;">
            <option value="lunch">午餐</option>
            <option value="dinner">晚餐单点</option>
          </select>
        </div>
        <div style="margin:0.75rem 0;">
          <div style="font-family:'EB Garamond',serif;font-size:0.7rem;letter-spacing:0.2em;color:var(--gold-dim);text-transform:uppercase;margin-bottom:0.6rem;">供应日期</div>
          <div style="display:flex;gap:0.5rem;flex-wrap:wrap;" id="newDayBoxes">
            <label class="day-label"><input type="checkbox" name="newDay" value="周一" onchange="toggleDayLabel(this)"/> 周一</label>
            <label class="day-label"><input type="checkbox" name="newDay" value="周二" onchange="toggleDayLabel(this)"/> 周二</label>
            <label class="day-label"><input type="checkbox" name="newDay" value="周三" onchange="toggleDayLabel(this)"/> 周三</label>
            <label class="day-label"><input type="checkbox" name="newDay" value="周四" onchange="toggleDayLabel(this)"/> 周四</label>
            <label class="day-label"><input type="checkbox" name="newDay" value="周五" onchange="toggleDayLabel(this)"/> 周五</label>
            <label class="day-label"><input type="checkbox" name="newDay" value="每日" onchange="toggleDayLabel(this)"/> 每日</label>
          </div>
        </div>
        <input id="newDesc" class="input-field" placeholder="描述（可选）" style="margin:0 0 0.75rem;width:100%;"/>
        <button class="add-btn" onclick="addMenuItem()">+ 添加菜品</button>
      </div>
      <!-- Menu table -->
      <div class="table-wrap">
        <table>
          <thead><tr><th>菜名</th><th>分类</th><th>供应日期</th><th>价格</th><th>描述</th><th>状态</th><th>操作</th></tr></thead>
          <tbody id="menuBody"><tr><td colspan="7" class="loading">加载中...</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- RANK TAB -->
    <div id="tabRank" style="display:none;">
      <div style="margin-bottom:1rem;font-family:'EB Garamond',serif;font-size:0.72rem;letter-spacing:0.2em;color:var(--muted);text-transform:uppercase;">
        点击日期标签可快速切换查看各天菜品排期
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;align-items:start;" id="rankGrid">
        <div class="loading" style="grid-column:1/-1">加载中...</div>
      </div>
    </div>

  </div>
</div>

<script>
  const SUPABASE_URL = 'https://vpdnzlfsdlsnrspsvyfu.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZwZG56bGZzZGxzbnJzcHN2eWZ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyODk3MDEsImV4cCI6MjA5Njg2NTcwMX0.FjVVVKTpYTGxEhD_1OlofMSfo5N7qGAy0-1HZVSQklQ';
  const ADMIN_PW = 'ldbfs2026';

  let allOrders = [];
  let currentFilter = 'all';

  // AUTH
  function login() {
    if (document.getElementById('pwInput').value === ADMIN_PW) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminScreen').style.display = 'block';
      loadOrders();
      setInterval(loadOrders, 60000);
    } else {
      document.getElementById('loginErr').style.display = 'block';
    }
  }
  function logout() {
    document.getElementById('adminScreen').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('pwInput').value = '';
  }

  // TABS
  function showTab(tab) {
    document.getElementById('tabOrders').style.display = tab === 'orders' ? 'block' : 'none';
    document.getElementById('tabMenu').style.display   = tab === 'menu'   ? 'block' : 'none';
    document.getElementById('tabRank').style.display   = tab === 'rank'   ? 'block' : 'none';
    document.getElementById('btnOrders').classList.toggle('active', tab === 'orders');
    document.getElementById('btnMenu').classList.toggle('active', tab === 'menu');
    document.getElementById('btnRank').classList.toggle('active', tab === 'rank');
    if (tab === 'menu') loadMenuItems();
    if (tab === 'rank') { if (!menuItems.length) loadMenuItems().then(renderRank); else renderRank(); }
  }

  function renderRank() {
    const grid = document.getElementById('rankGrid');
    const days = ['周一','周二','周三','周四','周五'];
    const cats = [{ key:'lunch', label:'午餐' }, { key:'dinner', label:'晚餐单点' }];
    grid.innerHTML = days.map(day =>
      cats.map(cat => {
        const items = menuItems.filter(m => {
          const d = m.day_of_week ? m.day_of_week.split(',').map(x=>x.trim()) : [];
          return (d.includes(day) || d.includes('每日')) && m.category === cat.key;
        });
        const rows = items.length
          ? items.map((m,i) => `
            <div class="rank-item">
              <span style="color:var(--muted);font-size:0.72rem;width:18px;text-align:right;flex-shrink:0;">${i+1}</span>
              <div class="rank-item-name">${m.name_cn}${m.name_en?`<span class="rank-item-en"> · ${m.name_en}</span>`:''}</div>
              <span class="rank-avail ${m.available?'on':'off'}">${m.available?'上架':'下架'}</span>
              <span style="font-size:0.78rem;color:var(--muted);flex-shrink:0;">${m.price>0?'$'+m.price:'套餐价'}</span>
            </div>`).join('')
          : `<div class="rank-empty">暂无菜品</div>`;
        const count = items.length;
        return `<div class="rank-card">
          <div class="rank-card-title">
            <span>${day} · ${cat.label}</span>
            <span style="color:${count>=3?'#4fdb7a':count>0?'#e6b432':'var(--muted)'};">${count} 道菜</span>
          </div>${rows}
        </div>`;
      }).join('')
    ).join('');
  }

  // FILTER
  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderOrders();
  }

  // ORDERS
  async function loadOrders() {
    try {
      const res = await fetch(SUPABASE_URL + '/rest/v1/orders?order=created_at.desc&limit=200', {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
      });
      allOrders = await res.json();
      renderOrders();
      updateStats();
      document.getElementById('lastUpdated').textContent =
        '更新于 ' + new Date().toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
    } catch(e) {
      document.getElementById('ordersLoading').textContent = '加载失败，请刷新';
    }
  }

  function renderOrders() {
    const list = currentFilter === 'all' ? allOrders : allOrders.filter(o => o.status === currentFilter);
    document.getElementById('ordersLoading').style.display = 'none';
    if (!list.length) {
      document.getElementById('ordersTable').style.display = 'none';
      document.getElementById('ordersEmpty').style.display = 'block';
      return;
    }
    document.getElementById('ordersEmpty').style.display = 'none';
    document.getElementById('ordersTable').style.display = 'table';
    const statusLabel = { pending:'待确认', confirmed:'已确认', delivered:'已完成', cancelled:'已取消' };
    document.getElementById('ordersBody').innerHTML = list.map(o => {
      const time = o.created_at ? new Date(o.created_at).toLocaleString('zh-CN',{timeZone:'America/Los_Angeles',month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
      const delivTag = o.delivery ? '<span class="badge badge-delivery">送餐</span>' : '<span class="badge badge-pickup">取餐</span>';
      const addr = o.delivery && o.address ? `<div style="font-size:0.75rem;color:var(--muted);margin-top:0.2rem;">📍${o.address}</div>` : '';
      const note = o.note ? `<span style="font-size:0.78rem;color:var(--muted);font-style:italic;">${o.note}</span>` : '—';
      const sc = o.status || 'pending';
      const sel = `<select class="status-select ${sc}" onchange="updateStatus(${o.id},this)">
        ${['pending','confirmed','delivered','cancelled'].map(s=>`<option value="${s}"${o.status===s?' selected':''}>${statusLabel[s]}</option>`).join('')}
      </select>`;
      const items = (o.orders||'').split('\n').join('<br>');
      return `<tr>
        <td><strong style="color:var(--gold)">${o.name||'—'}</strong></td>
        <td><span style="font-size:0.8rem;color:var(--muted)">${items||'—'}</span></td>
        <td><strong>$${o.total||0}</strong></td>
        <td style="white-space:nowrap;min-width:70px;">${delivTag}${addr}</td>
        <td>${note}</td>
        <td style="font-size:0.75rem;color:var(--muted);white-space:nowrap">${time}</td>
        <td>${sel}</td>
        <td><button onclick="deleteOrder(${o.id})" style="background:transparent;border:none;color:rgba(179,39,34,0.6);font-size:1.1rem;cursor:pointer;padding:0.2rem 0.4rem;transition:color 0.2s;" onmouseover="this.style.color='#e74c3c'" onmouseout="this.style.color='rgba(179,39,34,0.6)'" title="删除订单">✕</button></td>
      </tr>`;
    }).join('');
  }

  async function updateStatus(id, sel) {
    sel.className = 'status-select ' + sel.value;
    await fetch(SUPABASE_URL + '/rest/v1/orders?id=eq.' + id, {
      method: 'PATCH',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ status: sel.value })
    });
    const o = allOrders.find(x => x.id === id);
    if (o) { o.status = sel.value; updateStats(); }
  }

  async function deleteOrder(id) {
    if (!confirm('确认删除这条订单？此操作不可撤销。')) return;
    try {
      const res = await fetch(SUPABASE_URL + '/rest/v1/orders?id=eq.' + id, {
        method: 'DELETE',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Prefer': 'return=minimal' }
      });
      if (!res.ok) throw new Error();
      allOrders = allOrders.filter(o => o.id !== id);
      renderOrders();
      updateStats();
    } catch(e) {
      alert('删除失败，请重试');
    }
  }

  function updateStats() {
    const today = new Date().toLocaleDateString('en-CA', {timeZone:'America/Los_Angeles'});
    const tod = allOrders.filter(o => o.created_at && new Date(o.created_at).toLocaleDateString('en-CA',{timeZone:'America/Los_Angeles'}) === today);
    document.getElementById('statToday').textContent = tod.length;
    document.getElementById('statRevToday').textContent = '$' + tod.reduce((s,o)=>s+(parseFloat(o.total)||0),0).toFixed(0);
    document.getElementById('statTotal').textContent = allOrders.length;
    document.getElementById('statRevTotal').textContent = '$' + allOrders.reduce((s,o)=>s+(parseFloat(o.total)||0),0).toFixed(0);
    document.getElementById('statPending').textContent = allOrders.filter(o=>o.status==='pending').length;
    document.getElementById('statDelivery').textContent = allOrders.filter(o=>o.delivery===true).length;
  }

  // MENU
  let menuItems = [];

  async function loadMenuItems() {
    const res = await fetch(SUPABASE_URL + '/rest/v1/menu_items?order=id.asc', {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    menuItems = await res.json();
    renderMenu();
  }

  function renderMenu() {
    const tbody = document.getElementById('menuBody');
    if (!menuItems.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="empty">暂无菜品</td></tr>';
      return;
    }
    const allDays = ['周一','周二','周三','周四','周五','每日'];
    tbody.innerHTML = menuItems.map(item => {
      const selectedDays = item.day_of_week ? item.day_of_week.split(',').map(d=>d.trim()).filter(Boolean) : [];
      const dayTags = allDays.map(d => {
        const active = selectedDays.includes(d) ? 'active' : '';
        return `<span class="day-tag ${active}" onclick="toggleDay(${item.id},'${d}',this)">${d}</span>`;
      }).join('');
      return `<tr>
        <td><strong style="color:var(--gold)">${item.name_cn}</strong><br><span style="color:var(--muted);font-size:0.75rem;">${item.name_en||''}</span></td>
        <td>${item.category==='lunch'?'午餐':'晚餐单点'}</td>
        <td style="min-width:200px">${dayTags}</td>
        <td>${item.price>0?'$'+item.price:'套餐价'}</td>
        <td style="font-size:0.78rem;color:var(--muted)">${item.description||'—'}</td>
        <td><select class="status-select ${item.available?'confirmed':'cancelled'}" onchange="toggleAvail(${item.id},this.value==='true')">
          <option value="true" ${item.available?'selected':''}>上架</option>
          <option value="false" ${!item.available?'selected':''}>下架</option>
        </select></td>
        <td><button class="del-btn" onclick="deleteItem(${item.id})">删除</button></td>
      </tr>`;
    }).join('');
  }

  function toggleDayLabel(cb) {
    // handled by CSS :has selector
  }

  async function toggleDay(id, day, el) {
    const item = menuItems.find(m => m.id === id);
    if (!item) return;
    let days = item.day_of_week ? item.day_of_week.split(',').map(d=>d.trim()).filter(Boolean) : [];
    if (days.includes(day)) {
      days = days.filter(d => d !== day);
      el.classList.remove('active');
    } else {
      days.push(day);
      el.classList.add('active');
    }
    item.day_of_week = days.join(',');
    await fetch(SUPABASE_URL + '/rest/v1/menu_items?id=eq.' + id, {
      method: 'PATCH',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ day_of_week: item.day_of_week })
    });
  }

  async function toggleAvail(id, val) {
    await fetch(SUPABASE_URL + '/rest/v1/menu_items?id=eq.' + id, {
      method: 'PATCH',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ available: val })
    });
    await loadMenuItems();
  }

  async function updateDay(id, day) {
    await fetch(SUPABASE_URL + '/rest/v1/menu_items?id=eq.' + id, {
      method: 'PATCH',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ day_of_week: day })
    });
  }

  async function deleteItem(id) {
    if (!confirm('确定删除这道菜？')) return;
    await fetch(SUPABASE_URL + '/rest/v1/menu_items?id=eq.' + id, {
      method: 'DELETE',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    await loadMenuItems();
  }

  async function addMenuItem() {
    const name_cn = document.getElementById('newNameCn').value.trim();
    const name_en = document.getElementById('newNameEn').value.trim();
    const price = parseFloat(document.getElementById('newPrice').value) || 0;
    const category = document.getElementById('newCategory').value;
    const checkedDays = [...document.querySelectorAll('input[name="newDay"]:checked')].map(cb => cb.value);
    const day_of_week = checkedDays.join(',');
    const description = document.getElementById('newDesc').value.trim();
    if (!name_cn) { alert('请填写中文菜名'); return; }
    if (!day_of_week) { alert('请至少选择一个供应日期'); return; }
    await fetch(SUPABASE_URL + '/rest/v1/menu_items', {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ name_cn, name_en, price, category, day_of_week, description, available: true })
    });
    ['newNameCn','newNameEn','newPrice','newDesc'].forEach(id => document.getElementById(id).value = '');
    document.querySelectorAll('input[name="newDay"]').forEach(cb => {
      cb.checked = false;
      cb.parentElement.style.color = 'var(--muted)';
      cb.parentElement.style.borderColor = 'var(--border)';
    });
    await loadMenuItems();
  }
</script>
</body>
